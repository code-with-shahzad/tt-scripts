<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Automation</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── Header ── */
.header {
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 24px;
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 100;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.header-logo .logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dim));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.header-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 16px;
}
.connection-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-secondary);
  background: var(--bg-secondary); padding: 4px 12px;
  border-radius: 20px; border: 1px solid var(--border);
}
.connection-badge .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--success); animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Scrollable body ── */
.scroll-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── Banner ── */
.banner {
  background: linear-gradient(135deg, var(--bg-card), var(--bg-elevated));
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px;
  text-align: center;
}
.banner h1 {
  font-size: 26px; font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}
.banner h1 span { color: var(--accent); }
.banner p {
  color: var(--text-secondary); font-size: 14px;
}

/* ── Setup card ── */
.setup-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
}
.setup-card .section-title {
  font-size: 16px; font-weight: 700;
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 8px;
}

/* ── Username row ── */
.username-row {
  display: flex; gap: 12px; align-items: center;
  margin-bottom: 20px;
}
.username-row input {
  flex: 1;
  padding: 12px 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 16px;
  font-weight: 600;
  outline: none;
  transition: all var(--transition);
}
.username-row input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.username-row input::placeholder {
  color: var(--text-muted);
  font-weight: 400;
  font-size: 14px;
}

/* ── Action toggle ── */
.action-toggles {
  display: flex; gap: 0;
  margin-bottom: 20px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid var(--border);
  width: fit-content;
}
.action-toggles button {
  padding: 10px 22px;
  border: none;
  background: var(--bg-secondary);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font);
  border-right: 1px solid var(--border);
}
.action-toggles button:last-child { border-right: none; }
.action-toggles button:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}
.action-toggles button.active {
  background: var(--accent);
  color: var(--bg-deep);
}

/* ── Count grid ── */
.count-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.count-box {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  transition: all var(--transition);
  opacity: 0.35;
  pointer-events: none;
}
.count-box.active {
  opacity: 1;
  pointer-events: auto;
  border-color: var(--border-light);
}
.count-box label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.count-box .count-input-wrap {
  display: flex; align-items: center; gap: 8px;
}
.count-box input[type="number"] {
  width: 100%;
  padding: 8px 10px;
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 14px;
  font-weight: 600;
  outline: none;
  transition: all var(--transition);
  font-family: var(--font-mono);
}
.count-box input[type="number"]:focus {
  border-color: var(--accent);
}
.count-box .count-icon {
  font-size: 18px;
  flex-shrink: 0;
}

/* ── Start button ── */
.start-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--accent), var(--accent-dim));
  color: var(--bg-deep);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font);
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.start-btn:hover:not(:disabled) {
  box-shadow: 0 0 30px var(--accent-glow);
  transform: translateY(-1px);
}
.start-btn:disabled {
  opacity: 0.5; cursor: not-allowed;
}

/* ── Status / progress area ── */
.status-area {
  display: none;
  flex-direction: column;
  gap: 12px;
}

.status-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  animation: slide-in 0.3s ease;
}
@keyframes slide-in {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.status-card .top-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 10px;
}
.status-card .type-badge {
  font-size: 12px; font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.type-badge.comments {
  background: rgba(0,212,255,0.15);
  color: var(--accent);
}
.type-badge.likes {
  background: rgba(255,61,113,0.15);
  color: var(--danger);
}
.status-card .task-id {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-muted);
}
.status-card .status-badge-sm {
  margin-left: auto;
  font-size: 11px; font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: capitalize;
}
.status-badge-sm.running { background: rgba(0,212,255,0.12); color: var(--accent); }
.status-badge-sm.completed { background: rgba(0,230,118,0.12); color: var(--success); }
.status-badge-sm.cancelled { background: rgba(255,171,0,0.12); color: var(--warning); }
.status-badge-sm.failed { background: rgba(255,61,113,0.12); color: var(--danger); }

.status-card .progress-row {
  display: flex; align-items: center; gap: 10px;
}
.status-card .progress-row .pct {
  font-size: 13px; font-weight: 700;
  min-width: 40px;
  font-family: var(--font-mono);
}
.status-card .bar-wrap {
  flex: 1; height: 8px;
  background: var(--bg-secondary);
  border-radius: 4px; overflow: hidden;
}
.status-card .bar-wrap .bar-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.4s ease;
}
.bar-fill.comments-fill { background: linear-gradient(90deg, var(--accent), var(--accent-dim)); }
.bar-fill.likes-fill { background: linear-gradient(90deg, var(--danger), #ff6b9d); }
.bar-fill.completed-fill { background: linear-gradient(90deg, var(--success), var(--success-dim)); }
.bar-fill.cancelled-fill { background: linear-gradient(90deg, var(--warning), var(--warning-dim)); }

.status-card .counts {
  font-size: 12px; color: var(--text-secondary);
  font-family: var(--font-mono);
  margin-left: auto;
}
.status-card .counts .ok { color: var(--success); font-weight: 600; }
.status-card .counts .fail { color: var(--danger); font-weight: 600; }

/* ── User info banner ── */
.user-banner {
  display: none;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  align-items: center; gap: 16px;
  flex-wrap: wrap;
  animation: slide-in 0.3s ease;
}
.user-banner .live-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--success);
  animation: pulse-dot 1.5s infinite;
}
.user-banner .offline-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--text-muted);
}
.user-banner .ub-label {
  font-size: 12px; color: var(--text-muted);
}
.user-banner .ub-value {
  font-size: 13px; font-weight: 600;
  font-family: var(--font-mono);
}

/* ── Error alert ── */
.error-box {
  display: none;
  background: rgba(255,61,113,0.1);
  border: 1px solid rgba(255,61,113,0.2);
  border-radius: var(--radius);
  padding: 14px 18px;
  color: var(--danger);
  font-size: 13px;
  font-weight: 500;
  animation: slide-in 0.3s ease;
}

/* ── Stop button ── */
.stop-btn {
  padding: 4px 12px;
  border: 1px solid var(--danger);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--danger);
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font);
}
.stop-btn:hover { background: rgba(255,61,113,0.15); }

/* ── Console ── */
.console {
  background: var(--bg-primary);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  height: 200px;
  transition: height var(--transition);
}
.console.collapsed { height: 36px; overflow: hidden; }
.console-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  flex-shrink: 0;
  user-select: none;
}
.console-header:hover { background: var(--bg-hover); }
.console-header .con-label {
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.console-actions { margin-left: auto; display: flex; gap: 6px; }
.console-body {
  flex: 1; overflow-y: auto;
  padding: 6px 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
}
.con-log {
  display: flex; gap: 8px;
  padding: 1px 0;
  word-break: break-all;
}
.con-log .t { color: var(--text-muted); flex-shrink: 0; width: 65px; }
.con-log .b {
  font-size: 10px; font-weight: 700;
  padding: 0 5px; border-radius: 3px;
  flex-shrink: 0; text-transform: uppercase;
  min-width: 44px; text-align: center;
}
.con-log .b.info { background: rgba(68,138,255,0.12); color: var(--info); }
.con-log .b.ok { background: rgba(0,230,118,0.12); color: var(--success); }
.con-log .b.err { background: rgba(255,61,113,0.12); color: var(--danger); }
.con-log .b.warn { background: rgba(255,171,0,0.12); color: var(--warning); }
.con-log .b.req { background: rgba(0,212,255,0.1); color: var(--accent); }
.con-log .b.res { background: rgba(0,212,255,0.05); color: var(--text-secondary); }
.con-log .m { color: var(--text-secondary); flex: 1; }

.empty-state {
  text-align: center; padding: 24px;
  color: var(--text-muted);
  font-size: 13px;
}

@media (max-width: 640px) {
  .count-grid { grid-template-columns: 1fr; }
  .username-row { flex-direction: column; }
  .action-toggles { width: 100%; }
  .action-toggles button { flex: 1; text-align: center; }
}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-logo">
      <div class="logo-icon">🎯</div>
      <span>TikTok Automation</span>
    </div>
    <div class="header-right">
      <div class="connection-badge">
        <span class="dot"></span>
        <span>Connected</span>
      </div>
      <a href="/docs" target="_blank" class="btn btn-ghost btn-sm" style="font-size:12px;">API</a>
    </div>
  </header>

  <!-- Main -->
  <div class="scroll-body">

    <!-- Banner -->
    <div class="banner">
      <h1>TikTok Live <span>Automation</span></h1>
      <p>Enter a username, choose your action, and let it run.</p>
    </div>

    <!-- Setup -->
    <div class="setup-card">
      <div class="section-title">🚀 New Task</div>

      <!-- Username -->
      <div class="username-row">
        <input type="text" id="username-input" placeholder="Enter TikTok username (e.g. tiktok)" autocomplete="off" spellcheck="false">
      </div>

      <!-- Action Toggle -->
      <div class="action-toggles">
        <button data-action="comments" class="active">💬 Comments</button>
        <button data-action="likes">👍 Likes</button>
        <button data-action="both">🔥 Both</button>
      </div>

      <!-- Counts -->
      <div class="count-grid">
        <div class="count-box active" id="count-comments">
          <label>💬 Comments</label>
          <div class="count-input-wrap">
            <input type="number" id="comments-count" value="100" min="1" max="50000">
          </div>
        </div>
        <div class="count-box" id="count-likes">
          <label>👍 Likes</label>
          <div class="count-input-wrap">
            <input type="number" id="likes-count" value="100" min="1" max="50000">
          </div>
        </div>
      </div>

      <!-- Start -->
      <button class="start-btn" id="start-btn">▶ Start</button>
    </div>

    <!-- User Info Banner -->
    <div class="user-banner" id="user-banner">
      <span id="live-indicator"></span>
      <span class="ub-label">User:</span>
      <span class="ub-value" id="ub-username">—</span>
      <span class="ub-label">ID:</span>
      <span class="ub-value" id="ub-user-id">—</span>
      <span class="ub-label">Room:</span>
      <span class="ub-value" id="ub-room-id">—</span>
    </div>

    <!-- Error -->
    <div class="error-box" id="error-box"></div>

    <!-- Status Cards -->
    <div class="status-area" id="status-area"></div>

  </div>

  <!-- Console -->
  <div class="console" id="console">
    <div class="console-header" id="console-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-muted);"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      <span class="con-label">Activity Log</span>
      <div class="console-actions">
        <button class="stop-btn" id="console-clear-btn" style="border-color:var(--text-muted);color:var(--text-muted);font-size:10px;padding:2px 8px;">Clear</button>
      </div>
    </div>
    <div class="console-body" id="console-body">
      <div class="con-log"><span class="t"></span><span class="b info">info</span><span class="m">Ready — activity appears here</span></div>
    </div>
  </div>

</div>

<div id="toast-container" style="position:fixed;top:12px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none;"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
